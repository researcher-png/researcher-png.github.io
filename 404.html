<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f8f8f8;
    color: #222;
    overflow: hidden;
}

/* banner */
.banner {
    width: 100%;
    padding-top: 20px;
    display: flex;
    justify-content: center;
}

.banner img {
    width: 100%;
    max-height: 120px;
    object-fit: contain;
}

/* main */
.container {
    height: calc(100vh - 160px);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    position: relative;
    padding: 20px;
}

/* giant background 404 */
.bg404 {
    position: absolute;
    font-size: 18rem;
    font-weight: bold;
    color: rgba(0,0,0,0.04);
    user-select: none;
    z-index: 0;
    letter-spacing: -10px;
}

/* foreground content */
.content {
    position: relative;
    z-index: 1;
    max-width: 600px;
}

h1 {
    font-size: 2.8rem;
    margin-bottom: 10px;
}

p {
    color: #555;
    font-size: 1.1rem;
    line-height: 1.5;
}

/* funny line */
.funny {
    margin-top: 20px;
    font-style: italic;
    color: #888;
    min-height: 20px;
}

/* fake status */
.status {
    margin-top: 15px;
    font-size: 0.85rem;
    color: #999;
    font-family: monospace;
}

/* button */
a {
    display: inline-block;
    margin-top: 35px;
    padding: 12px 20px;
    border-radius: 999px;
    text-decoration: none;
    color: #222;
    border: 1px solid #ccc;
    transition: all 0.2s ease;
    background: white;
}

a:hover {
    transform: translateY(-2px);
    background: #222;
    color: white;
    border-color: #222;
}
</style>
</head>

<body>

<div class="banner">
    <img src="banner.png" alt="site banner">
</div>

<div class="container">

    <div class="bg404">404</div>

    <div class="content">

        <h1>Page not found</h1>

        <p>
            Whatever used to live here is either gone,
            broken, or hiding from you.
        </p>

        <div class="funny" id="funnyText"></div>

        <div class="status">
            STATUS: ur lost my guy i dunno either
        </div>

        <a href="/">Return home</a>

    </div>
</div>

<script>
const messages = [
    "You were snooping around, weren't ya?",
    "This page evaporated.",
    "Congratulations. You found nothing.",
    "The page escaped into the woods.",
    "404: skill issue.",
    "Either the link is broken or reality is.",
    "There is nothing here but dust and HTML.",
    "You took a wrong turn at the internet."
];

document.getElementById("funnyText").textContent =
    messages[Math.floor(Math.random() * messages.length)];
</script>

</body>
</html>
