<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Suggestion Test</title>

<style>
body {
    font-family: Arial, sans-serif;
    padding: 50px;
}

#wrap {
    width: 400px;
    position: relative;
}

input {
    width: 100%;
    padding: 10px;
    font-size: 16px;
}

#suggestions {
    list-style: none;
    padding: 0;
    margin: 0;
    border: 1px solid #ddd;
    border-top: none;
    position: absolute;
    width: 100%;
    background: white;
}

#suggestions li {
    padding: 10px;
    cursor: pointer;
}

#suggestions li:hover {
    background: #f2f2f2;
}
</style>
</head>

<body>

<div id="wrap">
    <input type="text" id="search" placeholder="Type something...">
    <ul id="suggestions"></ul>
</div>

<script>
const input = document.getElementById("search");
const box = document.getElementById("suggestions");

input.addEventListener("input", async () => {
    const q = input.value.trim();

    if (!q) {
        box.innerHTML = "";
        return;
    }

    try {
        const res = await fetch(
            `https://suggestqueries.google.com/complete/search?client=firefox&q=${encodeURIComponent(q)}`
        );

        const data = await res.json();

        box.innerHTML = "";

        data[1].forEach(item => {
            const li = document.createElement("li");
            li.textContent = item;

            li.onclick = () => {
                input.value = item;
                box.innerHTML = "";
            };

            box.appendChild(li);
        });

    } catch (err) {
        console.log("Suggestion error:", err);
    }
});
</script>

</body>
</html>
