<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Look it up, asshat</title>
    <link rel="icon" type="image/jpeg" href="icon.jpg">
    <style>
    :root {
        --bg: #ffffff;
        --text: #000000;
        --form-bg: #ffffff;
        --border: #dcdcdc;
        --shadow: rgba(32,33,36,.28);
        --muted: #888;
        --link: #000;
        --icon: #b1b1cb;
    }

    body.dark {
        --bg: #121212;
        --text: #ffffff;
        --form-bg: #1e1e1e;
        --border: #333;
        --shadow: rgba(0,0,0,.6);
        --muted: #aaa;
        --link: #fff;
        --icon: #888;
    }

    body {
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        align-items: center;
        height: 100vh;
        font-family: Arial, sans-serif;
        margin: 0;
        background-color: var(--bg);
        color: var(--text);
        transition: 0.3s;
    }

    h1 {
        font-size: 4rem;
        margin-bottom: 30px;
        text-align: center;
    }

    form {
        display: flex;
        align-items: center;
        width: 500px;
        max-width: 90vw;
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 6px 10px;
        box-shadow: 0 1px 6px var(--shadow);
        background-color: var(--form-bg);
    }

    input[type="search"] {
        flex: 1;
        border: none;
        outline: none;
        font-size: 1.2rem;
        padding: 10px;
        background: transparent;
        color: var(--text);
    }

    button {
        background: none;
        border: none;
        cursor: pointer;
        padding: 6px;
    }

    button img {
        width: 24px;
        height: 24px;
    }

    button:hover img {
        opacity: 0.8;
    }

    /* THEME TOGGLE */
    .theme-toggle {
        position: fixed;
        bottom: 20px;
        left: 20px;
        width: 37px;
        height: 37px;
        border: none;
        background: none;
        color: var(--icon);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    #theme-icon {
        transition: transform 0.5s ease;
    }

    #rays {
        transition: opacity 0.3s ease, transform 0.5s ease;
        transform-origin: center;
    }

    body.dark #rays {
        opacity: 0;
        transform: scale(0.5) rotate(90deg);
    }

    body.dark #theme-icon {
        transform: rotate(180deg);
    }

    input[type="search"]::-webkit-search-decoration,
    input[type="search"]::-webkit-search-cancel-button,
    input[type="search"]::-webkit-search-results-button,
    input[type="search"]::-webkit-search-results-decoration {
        display: none;
    }
    </style>
</head>
<body>
    <h1>Look it up, asshat.</h1>

    <form action="https://www.google.com/search" method="get" autocomplete="off">
        <input type="search" name="q" autocomplete="off" placeholder="Search Online...">
        <button type="submit">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/55/Magnifying_glass_icon.svg" alt="Search">
        </button>
    </form>

    <!-- Info button -->
    <a href="info/" title="Info" style="position:fixed; bottom:20px; right:20px; width:37px; height:37px; display:flex; align-items:center; justify-content:center; color:#b1b1cb;">
        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"></circle>
            <path d="M12 16v0"></path>
            <path d="M12 12a2 2 0 1 0-2-2"></path>
        </svg>
    </a>

    <!-- DARK MODE TOGGLE -->
    <button onclick="toggleDarkMode()" class="theme-toggle">
        <svg id="theme-icon" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
            <g id="rays">
                <line x1="12" y1="1" x2="12" y2="4"/>
                <line x1="12" y1="20" x2="12" y2="23"/>
                <line x1="4.2" y1="4.2" x2="6.2" y2="6.2"/>
                <line x1="17.8" y1="17.8" x2="19.8" y2="19.8"/>
                <line x1="1" y1="12" x2="4" y2="12"/>
                <line x1="20" y1="12" x2="23" y2="12"/>
                <line x1="4.2" y1="19.8" x2="6.2" y2="17.8"/>
                <line x1="17.8" y1="6.2" x2="19.8" y2="4.2"/>
            </g>
            <circle cx="12" cy="12" r="5"/>
        </svg>
    </button>

    <script>
const form = document.querySelector("form");
const input = form.querySelector("input[name='q']");
const heading = document.querySelector("h1");

const params = new URLSearchParams(window.location.search);
const friend = params.get('friend');
if (friend) {
    heading.textContent = `Look it up, ${decodeURIComponent(friend)}.`;
}

const triggers = [
    "look it up asshat",
    "lookitupasshat.com",
    "look it up, asshat",
    "lookitupasshat.com"
];

form.addEventListener("submit", (e) => {
    const query = input.value.toLowerCase().trim();
    const hostname = window.location.hostname.toLowerCase();

    const isTrigger = triggers.some(trigger => query.includes(trigger) || query.includes(hostname));
    if (isTrigger) {
        e.preventDefault();
        heading.textContent = "you're already on the website, asshat.";
    }
});

const konamiCode = [38,38,40,40,37,39,37,39,66,65,13];
let konamiIndex = 0;

const beepSound = new Audio('/sounds/select.wav');
const victorySound = new Audio('/sounds/victory.wav');

document.addEventListener('keydown', (e) => {
    if (e.keyCode === konamiCode[konamiIndex]) {
        beepSound.currentTime = 0;
        beepSound.play();
        konamiIndex++;

        if (konamiIndex === konamiCode.length) {
            victorySound.play();
            setTimeout(() => {
                window.location.href = '/surprise/';
            }, 800);
        }
    } else {
        konamiIndex = 0;
    }
});

function toggleDarkMode() {
    document.body.classList.toggle("dark");

    if (document.body.classList.contains("dark")) {
        localStorage.setItem("theme", "dark");
    } else {
        localStorage.setItem("theme", "light");
    }
}

// Apply saved theme
const savedTheme = localStorage.getItem("theme");
if (savedTheme === "dark") {
    document.body.classList.add("dark");
}
    </script>

    <div style="margin-top: 30px; font-size: 0.95rem; color: #888; text-align: center;">
        also check out <a href="https://lookitupasshat.com/translate/" style="color: var(--link); font-weight: bold;">Tranlate it, asshat</a>
        <br>
        and <a href="https://lookitupasshat.com/calculate/" style="color: var(--link); font-weight: bold;">Calculate it, asshat</a>!
    </div>
</body>
</html>
