<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Look it up, asshat</title>
<link rel="icon" type="image/jpeg" href="icon.jpg">

<style>
:root {
    --bg: #ffffff;
    --text: #000000;
    --form-bg: #ffffff;
    --border: #dcdcdc;
    --shadow: rgba(32,33,36,.28);
    --muted: #888;
    --link: #000;
    --icon: #b1b1cb;
}

body.dark {
    --bg: #121212;
    --text: #ffffff;
    --form-bg: #1e1e1e;
    --border: #333;
    --shadow: rgba(0,0,0,.6);
    --muted: #aaa;
    --link: #fff;
    --icon: #888;
}

body {
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    height: 100vh;
    font-family: Arial, sans-serif;
    margin: 0;
    background-color: var(--bg);
    color: var(--text);
}

h1 {
    font-size: 4rem;
    margin-bottom: 30px;
    text-align: center;
    color: var(--text);
}

form {
    display: flex;
    align-items: center;
    width: 500px;
    max-width: 90vw;
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 6px 10px;
    box-shadow: 0 1px 6px var(--shadow);
    background-color: var(--form-bg);
}

input[type="search"] {
    flex: 1;
    border: none;
    outline: none;
    font-size: 1.2rem;
    padding: 10px;
    background: transparent;
    color: var(--text);
}

button {
    background: none;
    border: none;
    cursor: pointer;
    padding: 6px;
}

button img {
    width: 24px;
    height: 24px;
}

button:hover img {
    opacity: 0.8;
}

input[type="search"]::-webkit-search-decoration,
input[type="search"]::-webkit-search-cancel-button,
input[type="search"]::-webkit-search-results-button,
input[type="search"]::-webkit-search-results-decoration {
    display: none;
}

a {
    color: var(--link);
    font-weight: bold;
    text-decoration: none;
}

.info-link {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 37px;
    height: 37px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--icon);
}

.footer {
    margin-top: 30px;
    font-size: 0.95rem;
    color: var(--muted);
    text-align: center;
}
</style>
</head>

<body>

<h1>Look it up, asshat.</h1>

<form action="https://www.google.com/search" method="get" autocomplete="off">
    <input type="search" name="q" placeholder="Search Online...">
    <button type="submit">
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/55/Magnifying_glass_icon.svg">
    </button>
</form>

<a class="info-link" href="info/" title="Info">
<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40"
viewBox="0 0 24 24" fill="none" stroke="currentColor"
stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
<circle cx="12" cy="12" r="10"></circle>
<path d="M12 16v0"></path>
<path d="M12 12a2 2 0 1 0-2-2"></path>
</svg>
</a>

<div class="footer">
also check out <a href="/translate/">Translate it, asshat</a><br>
and <a href="/calculate/">Calculate it, asshat</a>!
</div>

<script>
const form = document.querySelector("form");
const input = form.querySelector("input[name='q']");
const heading = document.querySelector("h1");

const params = new URLSearchParams(window.location.search);
const friend = params.get('friend');
if (friend) {
    heading.textContent = `Look it up, ${decodeURIComponent(friend)}.`;
}

form.addEventListener("submit", (e) => {
    const query = input.value.toLowerCase().trim();
    const hostname = window.location.hostname.toLowerCase();

    if (query.includes("look it up") || query.includes(hostname)) {
        e.preventDefault();
        heading.textContent = "you're already on the website, asshat.";
    }
});

const konamiCode = [38,38,40,40,37,39,37,39,66,65,13];
let index = 0;

document.addEventListener('keydown', (e) => {
    if (e.keyCode === konamiCode[index]) {
        index++;
        if (index === konamiCode.length) {
            window.location.href = '/surprise/';
        }
    } else {
        index = 0;
    }
});
</script>

<script src="/theme.js"></script>

</body>
</html>
