<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Look it up, asshat</title>
    <link rel="icon" type="image/png" href="icon.png">
    <style>
        #menuButton {
    position: fixed;
    top: 20px;
    left: 20px;
    font-size: 26px;
    cursor: pointer;
    z-index: 1000;
    color: #333;
}

#menu {
    position: fixed;
    top: 0;
    left: -260px;
    width: 220px;
    height: 100%;
    background: #fff;
    box-shadow: 2px 0 8px rgba(0,0,0,0.1);
    padding-top: 80px;
    transition: 0.3s;
}

#menu a {
    display: block;
    padding: 15px 20px;
    text-decoration: none;
    color: #333;
    font-size: 1rem;
}

#menu a:hover {
    background: #f2f2f2;
}
        body {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #fff;
        }
        h1 {
            font-size: 4rem;
            margin-bottom: 30px;
            text-align: center;
        }
        form {
            display: flex;
            align-items: center;
            width: 500px;
            max-width: 90vw;
            border: 1px solid #dcdcdc;
            border-radius: 24px;
            padding: 6px 10px;
            box-shadow: 0 1px 6px rgba(32,33,36,.28);
            background-color: #fff;
        }
        input[type="search"] {
            flex: 1;
            border: none;
            outline: none;
            font-size: 1.2rem;
            padding: 10px;
        }
        button {
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px;
        }
        button img {
            width: 24px;
            height: 24px;
        }
        button:hover img {
            opacity: 0.8;
        }
        input[type="search"]::-webkit-search-decoration,
        input[type="search"]::-webkit-search-cancel-button,
        input[type="search"]::-webkit-search-results-button,
        input[type="search"]::-webkit-search-results-decoration {
            display: none;
        }
    </style>
</head>
<body>
    <div id="menuButton">☰</div>

<div id="menu">
    <a href="/info/">Info</a>
    <a href="/translate/">Translate it, asshat</a>
    <a href="/calculate/">Calculate it, asshat</a>
</div>
    <h1>Look it up, asshat.</h1>
    <form action="https://www.google.com/search" method="get" autocomplete="off">
        <input type="search" name="q" autocomplete="off" placeholder="Search Online...">
        <button type="submit">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/55/Magnifying_glass_icon.svg" alt="Search">
        </button>
    </form>
    <!--<div style="margin-top: 40px; text-align: center;">
  <div style="display: inline-block; transform: scale(0.7); transform-origin: top center;">
      <script type='text/javascript' src='https://storage.ko-fi.com/cdn/widget/Widget_2.js'></script>
      <script type='text/javascript'>
          kofiwidget2.init('Tip', '#000000', 'D1D41UR0B5');
          kofiwidget2.draw();
      </script>
  </div>
    </div> -->
    <script>
        const menu = document.getElementById("menu");
const menuButton = document.getElementById("menuButton");

menuButton.onclick = () => {
    menu.style.left = menu.style.left === "0px" ? "-260px" : "0px";
};
const form = document.querySelector("form");
const input = form.querySelector("input[name='q']");
const heading = document.querySelector("h1");

const params = new URLSearchParams(window.location.search);
const friend = params.get('friend');
if (friend) {
    heading.textContent = `Look it up, ${decodeURIComponent(friend)}.`;
}

const triggers = [
    "look it up asshat",
    "lookitupasshat.com",
    "look it up, asshat",
    "lookitupasshat.com"
];

form.addEventListener("submit", (e) => {
    const query = input.value.toLowerCase().trim();
    const hostname = window.location.hostname.toLowerCase();

    const isTrigger = triggers.some(trigger => query.includes(trigger) || query.includes(hostname));
    if (isTrigger) {
        e.preventDefault();
        heading.textContent = "you're already on the website, asshat.";
    }
});

const konamiCode = [38,38,40,40,37,39,37,39,66,65,13];
let konamiIndex = 0;

const beepSound = new Audio('/sounds/select.wav');
const victorySound = new Audio('/sounds/victory.wav');

document.addEventListener('keydown', (e) => {
    if (e.keyCode === konamiCode[konamiIndex]) {
        beepSound.currentTime = 0;
        beepSound.play();
        konamiIndex++;

        if (konamiIndex === konamiCode.length) {
            victorySound.play();
            setTimeout(() => {
                window.location.href = '/surprise/';
            }, 800);
        }
    } else {
        konamiIndex = 0;
    }
});
    </script>
</body>
</html>
