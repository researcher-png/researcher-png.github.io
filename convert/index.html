<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convert it, asshat</title>
<link rel="icon" type="image/png" href="../icon.png">

<style>
#menuButton {
position: fixed;
top: 20px;
left: 20px;
font-size: 26px;
cursor: pointer;
z-index: 1005;
color: #333;
}

#menu {
position: fixed;
top: 0;
left: -260px;
width: 220px;
height: 100%;
background: #fff;
box-shadow: 2px 0 8px rgba(0,0,0,0.1);
padding-top: 80px;
transition: 0.3s;
z-index: 1000;
}

#menu a {
display: block;
padding: 15px 20px;
text-decoration: none;
color: #333;
font-size: 1rem;
}

#menu a:hover {
background: #f2f2f2;
}

body {
display: flex;
flex-direction: column;
align-items: center;
min-height: 100vh;
font-family: Arial, sans-serif;
margin: 0;
background: #fff;
box-sizing: border-box;
}

h1 {
font-size: 4rem;
margin-bottom: 25px;
text-align: center;
}

.spacer {
height: 40px;
}

.controls {
display: flex;
flex-wrap: wrap;
gap: 10px;
justify-content: center;
margin-bottom: 20px;
padding: 0 10px;
}

.category-btn {
background: #000;
color: #fff;
border: none;
border-radius: 20px;
padding: 8px 18px;
cursor: pointer;
font-size: 0.95rem;
transition: opacity 0.2s;
}

.category-btn:hover {
opacity: 0.8;
}

.converter-box {
display: flex;
width: 720px;
max-width: 95vw;
border: 1px solid #dcdcdc;
border-radius: 24px;
box-shadow: 0 1px 6px rgba(32,33,36,.28);
overflow: hidden;
background: #fff;
}

.panel {
flex: 1;
display: flex;
flex-direction: column;
}

.panel + .panel {
border-left: 1px solid #dcdcdc;
}

.select-row {
padding: 10px 14px 6px;
}

select {
width: 100%;
border: none;
outline: none;
font-size: 1rem;
background: transparent;
cursor: pointer;
font-family: Arial, sans-serif;
}

.panel-divider {
height: 1px;
background: #dcdcdc;
margin: 0 14px;
}

input {
border: none;
outline: none;
padding: 22px 14px;
font-size: 1.3rem;
font-family: Arial, sans-serif;
width: 100%;
box-sizing: border-box;
}

.result {
padding: 22px 14px;
font-size: 1.3rem;
word-break: break-word;
min-height: 30px;
}

.swap-btn-wrapper {
display: flex;
align-items: center;
justify-content: center;
padding: 0 6px;
background: #fff;
border-left: 1px solid #dcdcdc;
border-right: 1px solid #dcdcdc;
cursor: pointer;
}

.swap-btn {
background: none;
border: none;
font-size: 1.2rem;
cursor: pointer;
color: #888;
transition: color 0.2s;
}

.swap-btn:hover {
color: #333;
}

.status {
margin-top: 14px;
font-size: 0.85rem;
color: #999;
min-height: 1.2em;
}
</style>
</head>

<body>

<div id="menuButton">☰</div>

<div id="menu">
<a href="/">Main</a>
<a href="/info/">Info</a>
<a href="/translate/">Translate it, asshat</a>
<a href="/calculate/">Calculate it, asshat</a>
</div>

<div class="spacer"></div>

<h1 id="heading">Convert it, asshat.</h1>

<div class="controls">
<button class="category-btn" onclick="setCategory('distance')">Distance</button>
<button class="category-btn" onclick="setCategory('speed')">Speed</button>
<button class="category-btn" onclick="setCategory('temperature')">Temperature</button>
<button class="category-btn" onclick="setCategory('volume')">Volume</button>
<button class="category-btn" onclick="setCategory('weight')">Weight</button>
<button class="category-btn" onclick="setCategory('time')">Time</button>
<button class="category-btn" onclick="setCategory('data')">Data</button>
</div>

<div class="converter-box">

<div class="panel">
<div class="select-row">
<select id="fromUnit"></select>
</div>

<div class="panel-divider"></div>

<input type="number" id="inputValue" placeholder="Type a number..." oninput="convert()">
</div>

<div class="swap-btn-wrapper" onclick="swapUnits()">
<button class="swap-btn">⇄</button>
</div>

<div class="panel">
<div class="select-row">
<select id="toUnit"></select>
</div>

<div class="panel-divider"></div>

<div class="result" id="result">
Result goes here...
</div>
</div>

</div>

<div class="status" id="status"></div>

<script>
const unitData = {

distance: {
meter: 1,
kilometer: 1000,
centimeter: 0.01,
millimeter: 0.001,
mile: 1609.34,
yard: 0.9144,
foot: 0.3048,
inch: 0.0254,
smoot: 1.7018
},

speed: {
"kph": 1,
"mph": 1.60934,
"m/s": 3.6,
"knot": 1.852
},

volume: {
liter: 1,
milliliter: 0.001,
gallon: 3.78541,
quart: 0.946353,
cup: 0.236588
},

weight: {
kilogram: 1,
gram: 0.001,
milligram: 0.000001,
pound: 0.453592,
ounce: 0.0283495
},

time: {
second: 1,
minute: 60,
hour: 3600,
day: 86400,
week: 604800
},

data: {
byte: 1,
kilobyte: 1000,
megabyte: 1000000,
gigabyte: 1000000000,
terabyte: 1000000000000
}

};

let currentCategory = "distance";

const fromUnit = document.getElementById("fromUnit");
const toUnit = document.getElementById("toUnit");
const result = document.getElementById("result");

function setStatus(msg) {
document.getElementById("status").textContent = msg;
}

function populateUnits(units) {

fromUnit.innerHTML = "";
toUnit.innerHTML = "";

units.forEach(unit => {

const opt1 = document.createElement("option");
opt1.value = unit;
opt1.textContent = unit;
fromUnit.appendChild(opt1);

const opt2 = document.createElement("option");
opt2.value = unit;
opt2.textContent = unit;
toUnit.appendChild(opt2);

});

fromUnit.value = units[0];
toUnit.value = units[1];
}

function setCategory(category) {

currentCategory = category;

if (category === "temperature") {

populateUnits([
"Celsius",
"Fahrenheit",
"Kelvin"
]);

} else {

populateUnits(
Object.keys(unitData[category])
);

}

convert();
}

function convert() {

const value =
parseFloat(document.getElementById("inputValue").value);

if (isNaN(value)) {
result.textContent = "Result goes here...";
return;
}

const from = fromUnit.value;
const to = toUnit.value;

if (currentCategory === "temperature") {

let converted;

if (from === to) {
converted = value;
}

else if (from === "Celsius" && to === "Fahrenheit") {
converted = (value * 9/5) + 32;
}

else if (from === "Fahrenheit" && to === "Celsius") {
converted = (value - 32) * 5/9;
}

else if (from === "Celsius" && to === "Kelvin") {
converted = value + 273.15;
}

else if (from === "Kelvin" && to === "Celsius") {
converted = value - 273.15;
}

else if (from === "Fahrenheit" && to === "Kelvin") {
converted = ((value - 32) * 5/9) + 273.15;
}

else if (from === "Kelvin" && to === "Fahrenheit") {
converted = ((value - 273.15) * 9/5) + 32;
}

result.textContent = converted.toFixed(4);

return;
}

const base =
value * unitData[currentCategory][from];

const converted =
base / unitData[currentCategory][to];

result.textContent = converted.toFixed(4);
}

function swapUnits() {

const temp = fromUnit.value;

fromUnit.value = toUnit.value;
toUnit.value = temp;

convert();
}

fromUnit.addEventListener("change", convert);
toUnit.addEventListener("change", convert);

setCategory("distance");
</script>

<script>
// friend param
const params = new URLSearchParams(window.location.search);

const friend = params.get("friend");

if (friend) {
document.getElementById("heading").textContent =
`Convert it, ${decodeURIComponent(friend)}.`;
}
</script>

<script>
const menu = document.getElementById("menu");
const menuButton = document.getElementById("menuButton");

menuButton.onclick = () => {
menu.style.left =
menu.style.left === "0px"
? "-260px"
: "0px";
};
</script>

</body>
</html>
