<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Suggestion Test</title>

<style>
body {
    font-family: Arial, sans-serif;
    padding: 50px;
}

#wrap {
    width: 400px;
    position: relative;
}

input {
    width: 100%;
    padding: 10px;
    font-size: 16px;
}

#suggestions {
    list-style: none;
    padding: 0;
    margin: 0;
    border: 1px solid #ddd;
    border-top: none;
    position: absolute;
    width: 100%;
    background: white;
    z-index: 9999;
}

#suggestions li {
    padding: 10px;
    cursor: pointer;
}

#suggestions li:hover {
    background: #f2f2f2;
}
</style>
</head>

<body>

<div id="wrap">
    <input type="text" id="search" placeholder="Type something...">
    <ul id="suggestions"></ul>
</div>

<script>
const input = document.getElementById("search");
const box = document.getElementById("suggestions");

// small debounce so you don't spam the server
let timeout;

input.addEventListener("input", () => {
    clearTimeout(timeout);

    timeout = setTimeout(async () => {
        const q = input.value.trim();

        if (!q) {
            box.innerHTML = "";
            return;
        }

        try {
            const res = await fetch(
                "https://autocomplete-server-1tpu.onrender.com/suggest?q=" +
                encodeURIComponent(q)
            );

            const data = await res.json();

            // ✅ FIXED: Google autocomplete format
            const suggestions = Array.isArray(data) && Array.isArray(data[1])
                ? data[1]
                : [];

            box.innerHTML = "";

            for (const item of suggestions) {
                if (!item) continue;

                const li = document.createElement("li");
                li.textContent = item;

                li.onclick = () => {
                    input.value = item;
                    box.innerHTML = "";
                };

                box.appendChild(li);
            }

        } catch (err) {
            console.log("Suggestion error:", err);
        }

    }, 150);
});
</script>

</body>
</html>
