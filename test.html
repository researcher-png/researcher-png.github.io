<!-- TEST BUTTON -->
<button id="dreamTestBtn" style="
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 9999;
    padding: 10px 14px;
    border-radius: 10px;

    <script>
        const menu = document.getElementById("menu");
const menuButton = document.getElementById("menuButton");

menuButton.onclick = () => {
    menu.style.left = menu.style.left === "0px" ? "-260px" : "0px";
};
const form = document.querySelector("form");
const input = form.querySelector("input[name='q']");
const heading = document.querySelector("h1");

const params = new URLSearchParams(window.location.search);
const friend = params.get('friend');
if (friend) {
    heading.textContent = `Look it up, ${decodeURIComponent(friend)}.`;
}

const triggers = [
    "look it up asshat",
    "lookitupasshat.com",
    "look it up, asshat",
    "lookitupasshat.com"
];

form.addEventListener("submit", (e) => {
    const query = input.value.toLowerCase().trim();
    const hostname = window.location.hostname.toLowerCase();

    const isTrigger = triggers.some(trigger => query.includes(trigger) || query.includes(hostname));
    if (isTrigger) {
        e.preventDefault();
        heading.textContent = "you're already on the website, asshat.";
    }
});

const konamiCode = [38,38,40,40,37,39,37,39,66,65,13];
let konamiIndex = 0;

const beepSound = new Audio('/sounds/select.wav');
const victorySound = new Audio('/sounds/victory.wav');

document.addEventListener('keydown', (e) => {
    if (e.keyCode === konamiCode[konamiIndex]) {
        beepSound.currentTime = 0;
        beepSound.play();
        konamiIndex++;

        if (konamiIndex === konamiCode.length) {
            victorySound.play();
            setTimeout(() => {
                window.location.href = '/surprise/';
            }, 800);
        }
    } else {
        konamiIndex = 0;
    }
});
        const searchInput = document.querySelector("input[name='q']");
const suggestionBox = document.getElementById("suggestions");

let timeout;

searchInput.addEventListener("input", () => {
    clearTimeout(timeout);

    timeout = setTimeout(async () => {
        const q = searchInput.value.trim();

        if (!q) {
            suggestionBox.innerHTML = "";
            return;
        }

        try {
            const res = await fetch(
                "https://autocomplete-server-1tpu.onrender.com/suggest?q=" +
                encodeURIComponent(q)
            );

            const data = await res.json();

            // Google autocomplete format
            const suggestions = Array.isArray(data) && Array.isArray(data[1])
                ? data[1]
                : [];

            suggestionBox.innerHTML = "";
            const spacer = document.createElement("li");
spacer.textContent = "";
spacer.style.height = "14px";
spacer.style.pointerEvents = "none";
spacer.style.cursor = "default";
suggestionBox.appendChild(spacer);


            for (const item of suggestions) {
                if (!item) continue;

                const li = document.createElement("li");
                li.textContent = item;

                li.onclick = () => {
                    searchInput.value = item;
                    suggestionBox.innerHTML = "";
                };

                suggestionBox.appendChild(li);
            }

        } catch (err) {
            console.log("Suggestion error:", err);
        }

    }, 150);
});
        let dreamTimer;
let inDream = false;

const fade = document.getElementById("dreamFade");
const gif = document.getElementById("dreamGif");
const audio = document.getElementById("dreamAudio");
const testBtn = document.getElementById("dreamTestBtn");

// reset timer on ANY interaction
function resetDreamTimer() {
    if (inDream) return;

    clearTimeout(dreamTimer);
    dreamTimer = setTimeout(startDream, 5 * 60 * 1000); // 5 min
}

// listen for activity
["mousemove", "mousedown", "keydown", "scroll", "touchstart"].forEach(evt => {
    document.addEventListener(evt, resetDreamTimer);
});

resetDreamTimer();

// START DREAM MODE
function startDream() {
    if (inDream) return;
    inDream = true;

    // fade to black
    fade.classList.add("active");

    // music starts during fade
    setTimeout(() => {
        audio.currentTime = 0;
        audio.play().catch(() => {});
    }, 500);

    // gif appears after blackout
    setTimeout(() => {
        gif.classList.add("active");
    }, 2100);
}

// WAKE UP (instant snap back)
function wakeUp() {
    if (!inDream) return;

    inDream = false;

    fade.classList.remove("active");
    gif.classList.remove("active");

    audio.pause();
    audio.currentTime = 0;

    resetDreamTimer();
}

// ANY interaction during dream = instant wake
document.addEventListener("mousemove", wakeUp);
document.addEventListener("keydown", wakeUp);
document.addEventListener("mousedown", wakeUp);
document.addEventListener("touchstart", wakeUp);

// TEST BUTTON
testBtn.addEventListener("click", startDream);
    </script>
</body>
