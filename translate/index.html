}

<body>
<div id="menuButton">☰</div> 

<div id="menu">
<a href="/">Main</a>
<a href="/info/">Info</a>
<a href="/calculate/">Calculate it, asshat</a>
<a href="/convert/">Convert it, asshat</a>

<div class="spacer"></div> 


    <h1>Translate it, asshat.</h1>

    <div class="translate-box">
        <!-- Source panel -->
        <div class="lang-panel">
            <div class="lang-select-row">
                <select id="sourceLang">
                    <option value="auto">Detect language</option>
                </select>
            </div>
            <div class="panel-divider"></div>
            <textarea id="sourceText" placeholder="Type something..." maxlength="5000"></textarea>
            <div class="textarea-footer">
    <button class="speak-btn" onclick="speakText('sourceText', sourceSel.value)">
        <span class="material-symbols-outlined">volume_up</span>
    </button>
            </div>
            <div class="translate-btn-row">
                <button class="translate-btn" id="translateBtn" onclick="doTranslate()">Translate</button>
            </div>
        </div>

        <!-- Swap -->
        <div class="swap-btn-wrapper" onclick="swapLangs()" title="Swap languages">
            <button class="swap-btn">⇄</button>
        </div>

        <!-- Target panel -->
        <div class="lang-panel">
            <div class="lang-select-row">
                <select id="targetLang">
                    <option value="en">English</option>
                </select>
            </div>
            <div class="panel-divider"></div>
            <textarea id="targetText" readonly placeholder="Translation will appear here..."></textarea>
            <div class="textarea-footer">
    <button class="speak-btn" onclick="speakText('targetText', targetSel.value)">
        <span class="material-symbols-outlined">volume_up</span>
    </button>
            </div>
        </div>
    </div>

    <div class="status" id="status"></div>


    <script>
        const LIBRE_API = "https://libretranslate.com";

        const languages = [
            { code: "auto", name: "Detect language" },
            { code: "en", name: "English" },
            { code: "fr", name: "French" },
            { code: "es", name: "Spanish" },
            { code: "de", name: "German" },
            { code: "it", name: "Italian" },
            { code: "pt", name: "Portuguese" },
            { code: "nl", name: "Dutch" },
            { code: "pl", name: "Polish" },
            { code: "ru", name: "Russian" },
            { code: "zh", name: "Chinese" },
            { code: "ja", name: "Japanese" },
            { code: "ko", name: "Korean" },
            { code: "ar", name: "Arabic" },
            { code: "hi", name: "Hindi" },
            { code: "tr", name: "Turkish" },
            { code: "uk", name: "Ukrainian" },
            { code: "vi", name: "Vietnamese" },
            { code: "sv", name: "Swedish" },
            { code: "fi", name: "Finnish" },
            { code: "cs", name: "Czech" },
            { code: "ro", name: "Romanian" },
            { code: "hu", name: "Hungarian" },
            { code: "id", name: "Indonesian" },
        ];

        const sourceSel = document.getElementById("sourceLang");
        const targetSel = document.getElementById("targetLang");

        // Populate dropdowns
        sourceSel.innerHTML = "";
        targetSel.innerHTML = "";

        languages.forEach(lang => {
            const optS = document.createElement("option");
            optS.value = lang.code;
            optS.textContent = lang.name;
            sourceSel.appendChild(optS);

            if (lang.code !== "auto") {
                const optT = document.createElement("option");
                optT.value = lang.code;
                optT.textContent = lang.name;
                targetSel.appendChild(optT);
            }
        });

        // Default: detect → English
        sourceSel.value = "auto";
        targetSel.value = "en";

        function swapLangs() {
            const srcVal = sourceSel.value;
            const tgtVal = targetSel.value;

            // Can't swap "auto"
            if (srcVal === "auto") {
                setStatus("Can't swap from 'Detect language', pick a source first.");
                return;
            }

            sourceSel.value = tgtVal;
            targetSel.value = srcVal;

            // Also swap text
            const srcText = document.getElementById("sourceText").value;
            const tgtText = document.getElementById("targetText").value;
            document.getElementById("sourceText").value = tgtText;
            document.getElementById("targetText").value = srcText;
        }

        function setStatus(msg) {
            document.getElementById("status").textContent = msg;
        }

        async function doTranslate() {
            const text = document.getElementById("sourceText").value.trim();
            const source = sourceSel.value;
            const target = targetSel.value;
            const btn = document.getElementById("translateBtn");
            const output = document.getElementById("targetText");

            if (!text) {
                setStatus("Type something first, asshat.");
                return;
            }

            if (source === target) {
                setStatus("That's the same language, asshat.");
                return;
            }

            btn.disabled = true;
            setStatus("Translating...");
            output.value = "";

            try {
                const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${source === "auto" ? "autodetect" : source}|${target}`);

                if (!res.ok) throw new Error(`API error ${res.status}`);
                const data = await res.json();

                if (data.responseStatus === 200) {
    output.value = data.responseData.translatedText;
                    setStatus("");
                } else if (data.error) {
                    setStatus("Error: " + data.error);
                } else {
                    setStatus("Something went wrong.");
                }
            } catch (err) {
                setStatus("Translation failed. The API might be down, asshat.");
                console.error(err);
            } finally {
                btn.disabled = false;
            }
        }

        // Allow Ctrl+Enter to translate
        document.getElementById("sourceText").addEventListener("keydown", (e) => {
            if (e.key === "Enter" && e.ctrlKey) doTranslate();
        });
    </script>
  <script>
const menu = document.getElementById("menu");
const menuButton = document.getElementById("menuButton"); 

menuButton.onclick = () => {
menu.style.left = menu.style.left === "0px" ? "-260px" : "0px";
};
      function speakText(textareaId, lang) {
    const text = document.getElementById(textareaId).value.trim();
    if (!text) return;

    speechSynthesis.cancel();

    const utterance = new SpeechSynthesisUtterance(text);

    const langMap = {
        en: "en-US",
        fr: "fr-CA",
        es: "es-ES",
        de: "de-DE",
        it: "it-IT",
        pt: "pt-PT",
        nl: "nl-NL",
        pl: "pl-PL",
        ru: "ru-RU",
        ja: "ja-JP",
        ko: "ko-KR",
        zh: "zh-CN",
        ar: "ar-SA",
        hi: "hi-IN",
        tr: "tr-TR",
        uk: "uk-UA",
        vi: "vi-VN",
        sv: "sv-SE",
        fi: "fi-FI",
        cs: "cs-CZ",
        ro: "ro-RO",
        hu: "hu-HU",
        id: "id-ID"
    };

    utterance.lang = langMap[lang] || "en-US";

    speechSynthesis.speak(utterance);
      }
  </script>
