<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Translate it, asshat</title>
    <link rel="icon" type="image/png" href="../LIUAicon.png">
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #fff;
        }

        h1 {
            font-size: 4rem;
            margin-bottom: 30px;
            text-align: center;
        }

        .translate-box {
            display: flex;
            width: 700px;
            max-width: 95vw;
            border: 1px solid #dcdcdc;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 1px 6px rgba(32,33,36,.28);
        }

        .lang-panel {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .lang-panel + .lang-panel {
            border-left: 1px solid #dcdcdc;
        }

        .lang-select-row {
            display: flex;
            padding: 10px 14px 6px;
        }

        select {
            border: none;
            outline: none;
            font-size: 0.95rem;
            background: transparent;
            flex: 1;
        }

        textarea {
            border: none;
            outline: none;
            resize: none;
            font-size: 1.1rem;
            padding: 10px 14px 14px;
            min-height: 140px;
            width: 100%;
        }

        textarea[readonly] {
            background-color: #fafafa;
        }

        .swap-btn-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 6px;
            border-left: 1px solid #dcdcdc;
            border-right: 1px solid #dcdcdc;
            cursor: pointer;
        }

        .swap-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
        }

        .translate-btn-row {
            display: flex;
            justify-content: flex-end;
            padding: 8px 14px 14px;
        }

        .translate-btn {
            background: black;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 8px 20px;
            cursor: pointer;
        }

        .status {
            margin-top: 14px;
            font-size: 0.85rem;
            color: #999;
        }
    </style>
</head>

<body>

<h1 id="heading">Translate it, asshat.</h1>

<div class="translate-box">

    <div class="lang-panel">
        <div class="lang-select-row">
            <select id="sourceLang"></select>
        </div>

        <textarea id="sourceText" placeholder="Type something..."></textarea>

        <div class="translate-btn-row">
            <button class="translate-btn" onclick="doTranslate()">Translate</button>
        </div>
    </div>

    <div class="swap-btn-wrapper" onclick="swapLangs()">⇄</div>

    <div class="lang-panel">
        <div class="lang-select-row">
            <select id="targetLang"></select>
        </div>

        <textarea id="targetText" readonly placeholder="Translation will appear here..."></textarea>
    </div>

</div>

<div class="status" id="status"></div>

<script>
const languages = [
    { code: "auto", name: "Detect language" },
    { code: "en", name: "English" },
    { code: "fr", name: "French" },
    { code: "es", name: "Spanish" },
    { code: "de", name: "German" },
    { code: "it", name: "Italian" },
    { code: "pt", name: "Portuguese" },
    { code: "nl", name: "Dutch" },
    { code: "pl", name: "Polish" },
    { code: "ru", name: "Russian" },
    { code: "zh", name: "Chinese" },
    { code: "ja", name: "Japanese" },
    { code: "ko", name: "Korean" }
];

const sourceSel = document.getElementById("sourceLang");
const targetSel = document.getElementById("targetLang");

languages.forEach(lang => {
    const opt1 = document.createElement("option");
    opt1.value = lang.code;
    opt1.textContent = lang.name;
    sourceSel.appendChild(opt1);

    if (lang.code !== "auto") {
        const opt2 = document.createElement("option");
        opt2.value = lang.code;
        opt2.textContent = lang.name;
        targetSel.appendChild(opt2);
    }
});

sourceSel.value = "auto";
targetSel.value = "en";

function setStatus(msg) {
    document.getElementById("status").textContent = msg;
}

function swapLangs() {
    if (sourceSel.value === "auto") {
        setStatus("Pick a source language first.");
        return;
    }

    const a = sourceSel.value;
    sourceSel.value = targetSel.value;
    targetSel.value = a;
}

async function doTranslate() {
    const text = document.getElementById("sourceText").value.trim();
    const source = sourceSel.value;
    const target = targetSel.value;
    const output = document.getElementById("targetText");

    if (!text) return setStatus("Type something first.");
    if (source === target) return setStatus("Same language.");

    setStatus("Translating...");
    output.value = "";

    try {
        const res = await fetch(
            `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${source === "auto" ? "autodetect" : source}|${target}`
        );

        const data = await res.json();

        if (data.responseStatus === 200) {
            output.value = data.responseData.translatedText;
            setStatus("");
        } else {
            setStatus("Translation failed.");
        }
    } catch (e) {
        setStatus("API error.");
    }
}

// Konami code (kept)
const konamiCode = [38,38,40,40,37,39,37,39,66,65,13];
let konamiIndex = 0;

const beepSound = new Audio('/sounds/select.wav');
const victorySound = new Audio('/sounds/victory.wav');

document.addEventListener('keydown', (e) => {
    if (e.keyCode === konamiCode[konamiIndex]) {
        beepSound.currentTime = 0;
        beepSound.play();
        konamiIndex++;

        if (konamiIndex === konamiCode.length) {
            victorySound.play();
            setTimeout(() => {
                window.location.href = '/surprise/';
            }, 800);
        }
    } else {
        konamiIndex = 0;
    }
});
</script>

<script>
const params = new URLSearchParams(window.location.search);
const friend = params.get('friend');

if (friend) {
    document.getElementById('heading').textContent =
        `Translate it, ${decodeURIComponent(friend)}.`;
}
</script>

</body>
</html>
