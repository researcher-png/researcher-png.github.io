<!DOCTYPE html>    
<html lang="en">    
<head>    
<meta charset="UTF-8">    
<meta name="viewport" content="width=device-width, initial-scale=1.0">    
<title>Calculate it, asshat</title>    
<link rel="icon" type="image/jpeg" href="../icon.jpg">    

<style>    
* {    
    box-sizing: border-box;    
    margin: 0;    
    padding: 0;    
}    

/* ---------------- THEME SYSTEM ---------------- */    
:root {    
    --bg: #ffffff;    
    --text: #111111;    
    --card: #ffffff;    
    --border: #dcdcdc;    
    --shadow: rgba(32,33,36,.28);    
    --muted: #888;    
    --accent: #c0392b;    
    --btn: #ffffff;    
    --btnText: #111;    
    --btnBorder: #dcdcdc;    
    --op: #555;    
    --equals: #111;    
    --equalsText: #fff;    
}    

body.dark {    
    --bg: #121212;    
    --text: #ffffff;    
    --card: #1e1e1e;    
    --border: #333;    
    --shadow: rgba(0,0,0,.6);    
    --muted: #aaa;    
    --accent: #ff5c5c;    
    --btn: #1e1e1e;    
    --btnText: #fff;    
    --btnBorder: #333;    
    --op: #aaa;    
    --equals: #fff;    
    --equalsText: #000;    
}    

body {    
    display: flex;    
    flex-direction: column;    
    justify-content: flex-start;    
    align-items: center;    
    min-height: 100vh;    
    font-family: Arial, sans-serif;    
    background-color: var(--bg);    
    color: var(--text);    
    padding-top: 60px;    
}    

h1 {    
    font-size: 4rem;    
    margin-bottom: 30px;    
    text-align: center;    
    transition: color 0.2s;    
    color: var(--text);    
}    

h1.error {    
    color: var(--accent);    
}    

.calc-wrapper {    
    display: flex;    
    flex-direction: column;    
    align-items: center;    
    width: 340px;    
    max-width: 90vw;    
}    

.display {    
    width: 100%;    
    border: 1px solid var(--border);    
    border-radius: 18px;    
    padding: 14px 20px;    
    box-shadow: 0 1px 6px var(--shadow);    
    background-color: var(--card);    
    margin-bottom: 12px;    
    min-height: 72px;    
    display: flex;    
    flex-direction: column;    
    align-items: flex-end;    
    justify-content: center;    
    overflow: hidden;    
}    

.expression {    
    font-size: 0.95rem;    
    color: var(--muted);    
    min-height: 1.2em;    
    word-break: break-all;    
    text-align: right;    
}    

.value {    
    font-size: 2rem;    
    font-weight: bold;    
    color: var(--text);    
    word-break: break-all;    
    text-align: right;    
    transition: color 0.15s;    
}    

.value.error {    
    color: var(--accent);    
    font-size: 1.1rem;    
}    

.buttons {    
    width: 100%;    
    display: grid;    
    grid-template-columns: repeat(4, 1fr);    
    gap: 8px;    
}    

.btn {    
    background: var(--btn);    
    border: 1px solid var(--btnBorder);    
    border-radius: 14px;    
    padding: 18px 0;    
    font-size: 1.15rem;    
    cursor: pointer;    
    box-shadow: 0 1px 4px var(--shadow);    
    transition: 0.1s;    
    color: var(--btnText);    
    user-select: none;    
}    

.btn:hover {    
    filter: brightness(0.95);    
}    

.btn:active {    
    transform: scale(0.95);    
}    

.btn.operator {    
    color: var(--op);    
    font-weight: bold;    
}    

.btn.equals {    
    background: var(--equals);    
    color: var(--equalsText);    
    border-color: var(--equals);    
}    

.btn.clear {    
    color: var(--accent);    
    font-weight: bold;    
}    

.btn.wide {    
    grid-column: span 2;    
}    

.footer-link {    
    margin-top: 30px;    
    font-size: 0.95rem;    
    color: var(--muted);    
}    

.footer-link a {    
    color: var(--text);    
    font-weight: bold;    
    text-decoration: none;    
}    

.footer-link a:hover {    
    text-decoration: underline;    
}    

.info-btn {    
    position: fixed;    
    bottom: 20px;    
    right: 20px;    
    width: 37px;    
    height: 37px;    
    display: flex;    
    align-items: center;    
    justify-content: center;    
    color: var(--muted);    
    text-decoration: none;    
}    
</style>    
</head>    

<body>    

<h1 id="heading">Calculate it, asshat.</h1>    

<div class="calc-wrapper">    
    <div class="display">    
        <div class="expression" id="expression"></div>    
        <div class="value" id="displayValue">0</div>    
    </div>    

    <div class="buttons">    
        <button class="btn clear" data-action="clear">C</button>    
        <button class="btn operator" data-action="sign">+/-</button>    
        <button class="btn operator" data-action="percent">%</button>    
        <button class="btn operator" data-action="op" data-value="/">÷</button>    

        <button class="btn" data-action="digit" data-value="7">7</button>    
        <button class="btn" data-action="digit" data-value="8">8</button>    
        <button class="btn" data-action="digit" data-value="9">9</button>    
        <button class="btn operator" data-action="op" data-value="*">×</button>    

        <button class="btn" data-action="digit" data-value="4">4</button>    
        <button class="btn" data-action="digit" data-value="5">5</button>    
        <button class="btn" data-action="digit" data-value="6">6</button>    
        <button class="btn operator" data-action="op" data-value="-">−</button>    

        <button class="btn" data-action="digit" data-value="1">1</button>    
        <button class="btn" data-action="digit" data-value="2">2</button>    
        <button class="btn" data-action="digit" data-value="3">3</button>    
        <button class="btn operator" data-action="op" data-value="+">+</button>    

        <button class="btn wide" data-action="digit" data-value="0">0</button>    
        <button class="btn" data-action="decimal">.</button>    
        <button class="btn equals" data-action="equals">=</button>    
    </div>    
</div>    

<div class="footer-link">    
    also check out <a href="https://lookitupasshat.com/">Look it up, asshat</a>!    
</div>    

<a href="../info/" class="info-btn">    
<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24"
fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
<circle cx="12" cy="12" r="10"></circle>
<path d="M12 16v0"></path>
<path d="M12 12a2 2 0 1 0-2-2"></path>
</svg>    
</a>    

<script>    
// ================= ORIGINAL LOGIC (UNCHANGED) =================    
const heading = document.getElementById('heading');    
const displayValue = document.getElementById('displayValue');    
const expressionEl = document.getElementById('expression');    

const params = new URLSearchParams(window.location.search);    
const friend = params.get('friend');    
if (friend) {    
    heading.textContent = `Calculate it, ${decodeURIComponent(friend)}.`;    
}    

let currentValue = '0';    
let previousValue = null;    
let operator = null;    
let waitingForOperand = false;    
let expression = '';    
let justEvaluated = false;    

const roasts = [    
    "that's not even a number, asshat.",    
    "divided by zero? seriously?",    
    "you broke math. congrats.",    
    "error. much like your decisions.",    
    "the calculator is judging you.",    
    "bro what did you just do",    
];    

function getRandomRoast() {    
    return roasts[Math.floor(Math.random() * roasts.length)];    
}    

function updateDisplay(val, isError = false) {    
    displayValue.textContent = val;    
    displayValue.classList.toggle('error', isError);    
    expressionEl.textContent = expression;    
}    

function formatNumber(num) {    
    if (isNaN(num) || !isFinite(num)) return null;    
    return parseFloat(num.toPrecision(12)).toString();    
}    

function handleDigit(digit) {    
    if (justEvaluated) {    
        currentValue = digit;    
        expression = '';    
        justEvaluated = false;    
    } else if (waitingForOperand) {    
        currentValue = digit;    
        waitingForOperand = false;    
    } else {    
        currentValue = currentValue === '0' ? digit : currentValue + digit;    
    }    
    updateDisplay(currentValue);    
}    

function handleDecimal() {    
    if (justEvaluated) {    
        currentValue = '0.';    
        expression = '';    
        justEvaluated = false;    
    } else if (!currentValue.includes('.')) {    
        currentValue += '.';    
    }    
    updateDisplay(currentValue);    
}    

function handleOperator(op) {    
    const opSymbols = { '+': '+', '-': '−', '*': '×', '/': '÷' };    

    if (operator && !waitingForOperand) {    
        const result = evaluate();    
        previousValue = result;    
        currentValue = formatNumber(result);    
    } else {    
        previousValue = parseFloat(currentValue);    
    }    

    expression = currentValue + ' ' + opSymbols[op];    
    operator = op;    
    waitingForOperand = true;    
    updateDisplay(currentValue);    
}    

function evaluate() {    
    const prev = parseFloat(previousValue);    
    const curr = parseFloat(currentValue);    

    switch (operator) {    
        case '+': return prev + curr;    
        case '-': return prev - curr;    
        case '*': return prev * curr;    
        case '/': return curr === 0 ? Infinity : prev / curr;    
    }    
}    

function handleEquals() {    
    const result = evaluate();    
    if (!isFinite(result)) {    
        displayValue.textContent = getRandomRoast();    
        displayValue.classList.add('error');    
        return;    
    }    
    currentValue = formatNumber(result);    
    updateDisplay(currentValue);    
}    

function handleClear() {    
    currentValue = '0';    
    previousValue = null;    
    operator = null;    
    expression = '';    
    updateDisplay('0');    
}    

function handleSign() {    
    currentValue = formatNumber(parseFloat(currentValue) * -1);    
    updateDisplay(currentValue);    
}    

function handlePercent() {    
    currentValue = formatNumber(parseFloat(currentValue) / 100);    
    updateDisplay(currentValue);    
}    

document.querySelectorAll('.btn').forEach(btn => {    
    btn.addEventListener('click', () => {    
        const action = btn.dataset.action;    
        const value = btn.dataset.value;    

        switch (action) {    
            case 'digit': handleDigit(value); break;    
            case 'decimal': handleDecimal(); break;    
            case 'op': handleOperator(value); break;    
            case 'equals': handleEquals(); break;    
            case 'clear': handleClear(); break;    
            case 'sign': handleSign(); break;    
            case 'percent': handlePercent(); break;    
        }    
    });    
});    

// ================= KONAMI CODE (UNCHANGED) =================    
const konamiCode = [38,38,40,40,37,39,37,39,66,65,13];    
let konamiIndex = 0;    

document.addEventListener('keydown', (e) => {    
    if (e.keyCode === konamiCode[konamiIndex]) {    
        konamiIndex++;    
        if (konamiIndex === konamiCode.length) {    
            window.location.href = '/surprise/';    
        }    
    } else {    
        konamiIndex = 0;    
    }    
});    
</script>    

<script src="/theme.js"></script>    
</body>    
</html>
