<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Dream Mode Test</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial;
}

/* overlay */
#dreamOverlay {
    position: fixed;
    inset: 0;
    background: black;
    opacity: 0;
    pointer-events: none;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: opacity 1.5s ease;
    z-index: 9999;
}

#dreamGif {
    max-width: 80%;
    max-height: 80%;
    opacity: 0;
    transition: opacity 1.5s ease;
}

#dreamOverlay.active {
    opacity: 1;
}

#dreamOverlay.active #dreamGif {
    opacity: 1;
}

button {
    font-size: 20px;
    padding: 12px 18px;
    cursor: pointer;
}
</style>
</head>

<body>

<button onclick="enterDreamMode()">Start Dream Mode</button>

<div id="dreamOverlay">
    <img id="dreamGif" src="eepy.gif" />
    <audio id="dreamAudio" loop>
        <source src="eepy.mp3" type="audio/mpeg" />
    </audio>
</div>

<script>
const overlay = document.getElementById("dreamOverlay");
const audio = document.getElementById("dreamAudio");

function enterDreamMode() {
    overlay.classList.add("active");

    setTimeout(() => {
        audio.currentTime = 0;
        audio.play().catch(err => {
            console.log("Audio blocked:", err);
        });
    }, 500);
}

// click anywhere to exit
window.addEventListener("click", () => {
    overlay.classList.remove("active");
    audio.pause();
});
</script>

</body>
</html>
