<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Dream Mode Test</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
}

/* button */
button {
    font-size: 18px;
    padding: 10px 16px;
    cursor: pointer;
}

/* 🌑 fade layer */
#fadeOverlay {
    position: fixed;
    inset: 0;
    background: black;
    opacity: 0;
    pointer-events: none;
    transition: opacity 2s ease;
    z-index: 10;
}

#fadeOverlay.active {
    opacity: 1;
}

/* 👁 GIF layer */
#gifOverlay {
    position: fixed;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 1.5s ease;
    z-index: 20;
    background: black;
}

#gifOverlay.active {
    opacity: 1;
}

#gifOverlay img {
    max-width: 80%;
    max-height: 80%;
}
</style>
</head>

<body>

<button onclick="startDream()">Start Dream Mode</button>

<div id="fadeOverlay"></div>

<div id="gifOverlay">
    <img id="gif" src="eepy.gif">
</div>

<audio id="audio" loop>
    <source src="eepy.mp3" type="audio/mpeg">
</audio>

<script>
function startDream() {
    const fade = document.getElementById("fadeOverlay");
    const gifLayer = document.getElementById("gifOverlay");
    const audio = document.getElementById("audio");

    // 🌑 start fade immediately
    fade.classList.add("active");

    // 🎧 music starts during fade
    setTimeout(() => {
        audio.currentTime = 0;
        audio.play().catch(err => {
            console.log("Audio blocked:", err);
        });
    }, 500);

    // 👁 GIF appears after blackout
    setTimeout(() => {
        gifLayer.classList.add("active");
    }, 2100);
}
</script>

</body>
</html>
