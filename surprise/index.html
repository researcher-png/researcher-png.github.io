<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surprise Your Friend</title>
<link rel="icon" type="image/jpeg" href="icon.jpg">
<style>
    body {
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        align-items: center;
        height: 100vh;
        font-family: Arial, sans-serif;
        margin: 0;
        background-color: #fff;
    }
    h1 {
        font-size: 3rem;
        margin-top: 50px;
        margin-bottom: 20px;
        text-align: center;
    }
    input, button {
        font-size: 1.2rem;
        padding: 10px;
        margin: 5px;
        border-radius: 12px;
        border: 1px solid #dcdcdc;
    }
    button {
        cursor: pointer;
        background-color: #f0f0f0;
    }
    button:hover {
        background-color: #e0e0e0;
    }
    p a {
        color: blue;
        text-decoration: underline;
    }
</style>
</head>
<body>
<h1>Enter your friend's name:</h1>
<input type="text" id="friendInput" placeholder="Friend's name">
<button onclick="generateLink()">Generate Link</button>
<p id="linkOutput" style="color:red; font-weight:bold;"></p>

<script>
async function generateLink() {
    const name = document.getElementById('friendInput').value.trim();
    const output = document.getElementById('linkOutput');
    output.textContent = '';
    if (!name) return alert('Please enter a name!');

    try {
        const response = await fetch(`https://www.purgomalum.com/service/containsprofanity?text=${encodeURIComponent(name)}`);
        const isProfane = await response.text(); // "true" or "false"

        if (isProfane === "true") {
            output.textContent = '⚠ Offensive language detected, please choose another name.';
        } else {
            const url = `${window.location.origin}/?friend=${encodeURIComponent(name)}`;
            output.innerHTML = `Send this link to your friend: <a href="${url}" target="_blank">${url}</a>`;
        }
    } catch (err) {
        output.textContent = 'Error checking the name. Try again later.';
        console.error(err);
    }
}
</script>
</body>
</html>
